name: Publish Image

on:
  pull_request:
    paths:
      - .github/workflows/publish-image.yml
      - Dockerfile
      - docker-compose*.yml
      - pyproject.toml
      - uv.lock
      - transcribe_diarize.py
      - transcribe_diarize_app/**
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - .github/workflows/publish-image.yml
      - Dockerfile
      - docker-compose*.yml
      - pyproject.toml
      - uv.lock
      - transcribe_diarize.py
      - transcribe_diarize_app/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: transcribe-diarize
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate multi-arch container build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image coordinates
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "registry=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.registry }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=Meeting transcription and analysis container image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
