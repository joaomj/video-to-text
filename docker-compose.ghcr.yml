services:
  transcribe:
    image: ${TRANSCRIBE_DIARIZE_IMAGE:?Set TRANSCRIBE_DIARIZE_IMAGE to a GHCR image tag}
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      TRANSCRIPTION_BACKEND: faster
      WHISPER_MODEL: large-v3
      FASTER_WHISPER_DEVICE: cpu
      FASTER_WHISPER_COMPUTE_TYPE: int8
      HF_ACCESS_TOKEN_FILE: /run/secrets/hf_access_token
    secrets:
      - hf_access_token
    volumes:
      - ./input:/data/input:ro
      - ./output:/data/output
      - transcribe-diarize-cache:/home/transcribe/.cache

volumes:
  transcribe-diarize-cache:
    name: transcribe-diarize-cache

secrets:
  hf_access_token:
    file: ./secrets/hf_access_token.txt
